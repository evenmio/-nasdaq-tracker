<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>纳指弹药追踪</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0d1117;color:#e6edf3;padding:16px;min-height:100vh}
  .card{background:#161b22;border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid #30363d}
  h1{font-size:18px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:#8b949e;margin-bottom:16px}
  .price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .price{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums}
  .change{font-size:18px;font-weight:600}
  .up{color:#3fb950}.down{color:#f85149}
  .label{font-size:13px;color:#8b949e;margin-bottom:4px}
  .verdict{font-size:16px;font-weight:600;padding:12px 16px;border-radius:8px;margin-top:4px}
  .trigger{background:rgba(248,81,73,0.15);border:1px solid #f85149;color:#f85149}
  .normal{background:rgba(63,185,80,0.1);border:1px solid #3fb950;color:#3fb950}
  .hold{background:rgba(139,148,158,0.1);border:1px solid #30363d;color:#8b949e}
  .plan-box{background:#0d1117;border-radius:8px;padding:14px;margin-top:10px}
  .plan-item{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;gap:8px}
  .plan-item .val{color:#e6edf3;text-align:right}
  .footer{text-align:center;font-size:12px;color:#484f58;margin-top:20px}
  .loading{text-align:center;padding:40px 0;color:#8b949e}
  .btn{display:block;width:100%;padding:14px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px}
  .btn:active{background:#2ea043}
  .info-row{display:flex;justify-content:space-between;font-size:13px;color:#8b949e;padding:2px 0;gap:8px;flex-wrap:wrap}
  .highlight{color:#f0883e;font-weight:600}
  .note{font-size:12px;color:#484f58;margin-top:8px;line-height:1.6}
</style>
</head>
<body>

<div class="card">
  <h1>纳斯达克弹药追踪器</h1>
  <div class="sub">Plan B — 基础180元 + 弹药70元</div>
  <div id="status" class="loading">正在获取数据...</div>
</div>

<div id="detail" style="display:none">
  <div class="card">
    <div class="label">纳斯达克综合指数</div>
    <div class="price-row">
      <span class="price" id="price">--</span>
      <span class="change" id="change">--</span>
    </div>
    <div class="info-row">
      <span>今开: <span id="open">--</span></span>
      <span>最高: <span id="high">--</span></span>
      <span>最低: <span id="low">--</span></span>
      <span>昨收: <span id="prevClose">--</span></span>
    </div>
    <div class="info-row" style="margin-top:4px">
      <span>更新: <span id="updateTime" style="color:#8b949e">--</span></span>
    </div>
  </div>

  <div class="card">
    <div class="label">今日操作</div>
    <div id="verdict" class="verdict">--</div>
    <div id="planDetail" class="plan-box" style="display:none">
      <div class="plan-item"><span>总投入</span><span class="val" id="totalAmount">--</span></div>
      <div class="plan-item"><span>大成 000834</span><span class="val" id="dcAmount">--</span></div>
      <div class="plan-item"><span>广发 270042</span><span class="val" id="gfAmount">--</span></div>
      <div class="plan-item"><span>天弘 018043</span><span class="val" id="thAmount">--</span></div>
    </div>
  </div>

  <div class="card">
    <div class="label">定投计划</div>
    <div class="plan-item"><span>基础</span><span class="val">大成30+广发80+天弘70 = 180元</span></div>
    <div class="plan-item"><span>弹药</span><span class="val">大成+20+广发+20+天弘+30 = 70元</span></div>
    <div class="plan-item"><span>触发</span><span class="val">纳指跌超 1.5%</span></div>
    <div class="plan-item"><span>今日满额</span><span class="val highlight">大成50+广发100+天弘100 = 250元</span></div>
    <div class="plan-item"><span>总预算</span><span class="val">10,000元</span></div>
  </div>
</div>

<button class="btn" onclick="refresh()">刷新</button>

<div class="footer">
  数据: 腾讯行情 | 仅供参考
</div>

<script>
// ===== 数据源: 优先新浪(更新快)，降级腾讯 =====
var _loaded = false;

function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return '--';
  return n.toFixed(2);
}

function renderData(d, source) {
  var st = document.getElementById('status');
  st.style.display = 'none';
  document.getElementById('detail').style.display = 'block';

  document.getElementById('price').textContent = fmt(d.close);
  document.getElementById('open').textContent = fmt(d.open);
  document.getElementById('high').textContent = fmt(d.high);
  document.getElementById('low').textContent = fmt(d.low);
  document.getElementById('prevClose').textContent = fmt(d.prevClose);
  document.getElementById('updateTime').textContent = d.time || '--';

  var el = document.getElementById('change');
  var isUp = d.pct >= 0;
  el.textContent = (isUp ? '+' : '') + fmt(d.pct) + '%';
  el.className = 'change ' + (isUp ? 'up' : 'down');
  document.title = '纳指 ' + (isUp ? '+' : '') + fmt(d.pct) + '%';

  // 数据来源显示
  document.querySelector('.footer').innerHTML =
    '数据: ' + (source === 'sina' ? '新浪财经' : '腾讯行情') +
    ' | 仅供参考' + ' | <span style="color:#484f58">' + (d.time || '') + '</span>';

  // 判断弹药
  var ve = document.getElementById('verdict');
  var pe = document.getElementById('planDetail');
  var absPct = Math.abs(d.pct);

  if (d.pct < 0 && absPct >= 1.5) {
    ve.textContent = '触发弹药! 跌了 ' + absPct.toFixed(1) + '%';
    ve.className = 'verdict trigger';
    pe.style.display = 'block';
    document.getElementById('totalAmount').textContent = '250元 (基础180+弹药70)';
    document.getElementById('dcAmount').textContent = '50元';
    document.getElementById('gfAmount').textContent = '100元';
    document.getElementById('thAmount').textContent = '100元';
  } else if (d.pct < 0) {
    ve.textContent = '跌了 ' + absPct.toFixed(1) + '% 未达阈值，弹药留着';
    ve.className = 'verdict hold';
    pe.style.display = 'block';
    document.getElementById('totalAmount').textContent = '180元 (基础)';
    document.getElementById('dcAmount').textContent = '30元';
    document.getElementById('gfAmount').textContent = '80元';
    document.getElementById('thAmount').textContent = '70元';
  } else {
    ve.textContent = '上涨 ' + fmt(d.pct) + '%，不上弹药';
    ve.className = 'verdict normal';
    pe.style.display = 'block';
    document.getElementById('totalAmount').textContent = '180元 (基础)';
    document.getElementById('dcAmount').textContent = '30元';
    document.getElementById('gfAmount').textContent = '80元';
    document.getElementById('thAmount').textContent = '70元';
  }
}

function parseSinaData(raw) {
  // var hq_str_gb_$ixic="名称,现价,涨跌幅%,时间,涨跌额,开盘,最高,最低,昨收"
  var f = raw.split(',');
  if (f.length < 9) return null;
  var close = parseFloat(f[1]);
  var changePct = parseFloat(f[2]);  // parseFloat 自动忽略后缀 %
  if (isNaN(close) || isNaN(changePct)) return null;
  return {
    close: close,
    pct: changePct,
    open: parseFloat(f[5]),
    high: parseFloat(f[6]),
    low: parseFloat(f[7]),
    prevClose: parseFloat(f[8]),
    time: f[3]
  };
}

function parseTencentData(raw) {
  var f = raw.split('~');
  var close = parseFloat(f[3]);
  var changePct = parseFloat(f[32]);
  if (isNaN(close) || isNaN(changePct)) return null;
  return {
    close: close,
    pct: changePct,
    open: parseFloat(f[5]),
    high: parseFloat(f[33]),
    low: parseFloat(f[34]),
    prevClose: parseFloat(f[4]),
    time: f[30] || '--'
  };
}

function trySina() {
  var s = document.createElement('script');
  s.onload = function() {
    if (_loaded) return;
    var raw = window['hq_str_gb_$ixic'];
    if (!raw) { tryTencent(); return; }
    var d = parseSinaData(raw);
    if (!d) { tryTencent(); return; }
    _loaded = true;
    renderData(d, 'sina');
  };
  s.onerror = function() {
    if (!_loaded) tryTencent();
  };
  s.src = 'https://hq.sinajs.cn/list=gb_$ixic?' + Date.now();
  document.head.appendChild(s);
}

function tryTencent() {
  if (_loaded) return;
  var s = document.createElement('script');
  s.onload = function() {
    if (_loaded) return;
    try {
      var raw = window.v_usIXIC;
      if (!raw) throw new Error('empty');
      var d = parseTencentData(raw);
      if (!d) throw new Error('parse fail');
      _loaded = true;
      renderData(d, 'tencent');
    } catch(e) {
      document.getElementById('status').textContent = '解析失败: ' + e.message;
    }
  };
  s.onerror = function() {
    if (!_loaded) {
      document.getElementById('status').textContent = '数据请求失败，检查网络后重试';
    }
  };
  s.src = 'https://qt.gtimg.cn/q=usIXIC?' + Date.now();
  document.head.appendChild(s);
}

function refresh() {
  _loaded = false;
  var st = document.getElementById('status');
  st.style.display = 'block';
  st.textContent = '正在获取数据...';
  document.getElementById('detail').style.display = 'none';
  trySina();  // 优先新浪
}

refresh();
</script>
</body>
</html>
